[rpc]
base_rpc_url = "https://mainnet.base.org"
# For testnet use: "https://sepolia.base.org"
# ERC-4337 bundler — required when use_smart_wallet = true
# Coinbase bundler (recommended): "https://api.developer.coinbase.com/rpc/v1/base/<API_KEY>"
# Pimlico alternative:            "https://api.pimlico.io/v2/base/rpc?apikey=<API_KEY>"
# bundler_url = ""

[pair]
# WETH on Base (used as token_in for BUY, token_out for SELL)
token_in  = "0x4200000000000000000000000000000000000006"
# Jetvoy (VOY) on Base
token_out = "0xe58b3ab1fb80304de37a507a2449fea64bf0b507"
# Uniswap V2 pair (WETH/JETVOY)
pair_address = "0x8361e0FD714DA989874CCbF34175D64673B1B3D4"
# Not used for V2 but kept for reference
fee_tier  = 3000

[sizing]
min_usd = 0.05
max_usd = 2.0
# Small amounts — fees should stay in pennies on Base
lognormal_mu    = 0.5
lognormal_sigma = 0.4

[timing]
min_delay_secs = 45
max_delay_secs = 420
# exponential distribution lambda — average ~3min between trades
exp_lambda = 0.006

[bias]
buy_weight  = 55
sell_weight = 45

[wallets]
# Bot loads all WALLET_KEY_0, WALLET_KEY_1, ... from environment
keys_env_prefix = "WALLET_KEY_"
# ── Coinbase Smart Wallet mode ────────────────────────────────────────────────
# When true, every swap is executed AS the smart wallet via ERC-4337 UserOperation.
# The signer EOA (WALLET_KEY_0) must be added as an owner of the smart wallet first.
# Address rotation is handled by the smart wallet's sub-account system.
use_smart_wallet = false
# smart_wallet_address = "0x..."   # the CoinbaseSmartWallet contract address on Base

[safety]
# Stop bot if total USD traded today exceeds this
max_daily_volume_usd = 50000.0
# Abort if gas price exceeds this (in gwei)
max_gas_gwei = 10.0
# Slippage range in basis points (50 = 0.5%, 150 = 1.5%)
min_slippage_bps = 50
max_slippage_bps = 150
# Tx deadline in seconds from submission
tx_deadline_secs = 120

[logging]
# Path to append-only trade CSV log
log_file = "trades.csv"
# Optional Telegram alert on N consecutive failures (set to 0 to disable)
alert_on_consecutive_failures = 3
# telegram_bot_token = ""
# telegram_chat_id   = ""
